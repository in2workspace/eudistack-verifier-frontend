name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Check if release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_EXISTS=$(gh release view "v${{ env.VERSION }}" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ "$TAG_EXISTS" = "v${{ env.VERSION }}" ]; then
            echo "::notice::Release v${{ env.VERSION }} already exists — skipping."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --notes "Release of version v${{ env.VERSION }}" \
            --target main

      - name: Trigger deploy to STG
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml -f environment=stg --ref main
          echo "### Auto-deploy to STG triggered" >> $GITHUB_STEP_SUMMARY
