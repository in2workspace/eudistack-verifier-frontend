name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - stg
        default: 'stg'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AMPLIFY_APP_NAME: login-ui
      BRANCH_NAME: main
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --output-path=./dist/out --configuration "production"

      - name: Inject tenant assets
        run: |
          TENANT="altia"
          ASSETS_DIR="dist/out/browser/assets"
          git clone --depth 1 https://github.com/in2workspace/eudistack-platform-assets.git /tmp/platform-assets
          mkdir -p "${ASSETS_DIR}/tenant"
          cp -r /tmp/platform-assets/tenants/${TENANT}/* "${ASSETS_DIR}/tenant/"
          cp /tmp/platform-assets/tenants/${TENANT}/theme.json "${ASSETS_DIR}/theme.json"
          echo "Injected ${TENANT} tenant assets"

      - name: Generate env.js
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base

          if [ -f dist/out/browser/assets/env.template.js ]; then
            envsubst < dist/out/browser/assets/env.template.js > dist/out/browser/assets/env.js
            echo "Generated env.js"
          else
            echo "env.template.js not found" >&2
            exit 1
          fi

      - name: Create Zip
        run: |
          cd dist/out/browser
          zip -r ../../out.zip .
          echo "ZIP_FILE=dist/out.zip" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Amplify
        run: |
          set -euo pipefail
          AMPLIFY_APP_ID=$(aws amplify list-apps --query "apps[?name=='${{ env.AMPLIFY_APP_NAME }}'] | [0].appId" --output text)
          echo "AMPLIFY_APP_ID=$AMPLIFY_APP_ID" >> $GITHUB_ENV

          DEPLOYMENT_OUTPUT=$(aws amplify create-deployment --app-id "${AMPLIFY_APP_ID}" --branch-name "${{ env.BRANCH_NAME }}" --output json)
          ZIP_UPLOAD_URL=$(echo $DEPLOYMENT_OUTPUT | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOYMENT_OUTPUT | jq -r '.jobId')

          curl -X PUT --upload-file ${{ env.ZIP_FILE }} "${ZIP_UPLOAD_URL}"
          aws amplify start-deployment --app-id "${AMPLIFY_APP_ID}" --branch-name "${{ env.BRANCH_NAME }}" --job-id "${JOB_ID}"

          echo "### 🚀 Deployed to Amplify" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** ${{ env.AMPLIFY_APP_NAME }}" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test
        run: |
          SITE_URL="https://login-${{ inputs.environment }}.altia.eudistack.net"
          sleep 30
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "${SITE_URL}" --max-time 15 || echo "000")
          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "Smoke test passed (HTTP ${HTTP_STATUS})"
          else
            echo "::warning::Smoke test returned HTTP ${HTTP_STATUS}"
          fi
