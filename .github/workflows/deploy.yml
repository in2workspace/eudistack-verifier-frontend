name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - stg
        default: 'stg'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SPA_PREFIX: verifier
      S3_BUCKET: eudistack-${{ inputs.environment }}-s3-ew1-spa
      CF_COMMENT_PREFIX: eudistack-${{ inputs.environment }}-cdn-ew1-
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --output-path=./dist/out --configuration "production" --base-href=/${SPA_PREFIX}/ --deploy-url=/${SPA_PREFIX}/

      - name: Generate env.js
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base

          if [ -f dist/out/browser/assets/env.template.js ]; then
            envsubst < dist/out/browser/assets/env.template.js > dist/out/browser/assets/env.js
            echo "Generated env.js"
          else
            echo "env.template.js not found" >&2
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build to S3
        run: |
          set -euo pipefail

          aws s3 sync dist/out/browser/ "s3://${S3_BUCKET}/${SPA_PREFIX}/" \
            --delete \
            --exclude "index.html" \
            --exclude "assets/env.js" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 cp dist/out/browser/index.html "s3://${S3_BUCKET}/${SPA_PREFIX}/index.html" \
            --cache-control "no-store" \
            --content-type "text/html"

          aws s3 cp dist/out/browser/assets/env.js "s3://${S3_BUCKET}/${SPA_PREFIX}/assets/env.js" \
            --cache-control "no-store" \
            --content-type "application/javascript"

      - name: Invalidate all tenant CloudFront distributions
        run: |
          set -euo pipefail

          DIST_IDS=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?starts_with(Comment, '${CF_COMMENT_PREFIX}')].Id" \
            --output text)

          if [ -z "${DIST_IDS}" ]; then
            echo "::error::No CloudFront distributions found for prefix '${CF_COMMENT_PREFIX}'"
            exit 1
          fi

          echo "### Deployed to S3 + CloudFront" >> $GITHUB_STEP_SUMMARY
          echo "- **Bucket:** s3://${S3_BUCKET}/${SPA_PREFIX}/" >> $GITHUB_STEP_SUMMARY
          echo "- **Invalidations:**" >> $GITHUB_STEP_SUMMARY
          for DIST_ID in ${DIST_IDS}; do
            aws cloudfront create-invalidation \
              --distribution-id "${DIST_ID}" \
              --paths "/${SPA_PREFIX}/*" >/dev/null
            echo "  - ${DIST_ID}" >> $GITHUB_STEP_SUMMARY
          done
