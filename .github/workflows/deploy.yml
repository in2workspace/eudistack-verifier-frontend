name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - stg
        default: 'stg'
      tenant:
        description: 'Tenant (used as CloudFront distribution key and host: <tenant>-<env>.eudistack.net)'
        required: true
        type: string
        default: 'sandbox'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SPA_PREFIX: verifier
      TENANT: ${{ inputs.tenant }}
      S3_BUCKET: eudistack-${{ inputs.environment }}-s3-ew1-spa
      CF_COMMENT: eudistack-${{ inputs.environment }}-cdn-ew1-${{ inputs.tenant }}
      SITE_HOST: ${{ inputs.tenant }}-${{ inputs.environment }}.eudistack.net
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --output-path=./dist/out --configuration "production" --base-href=/${SPA_PREFIX}/ --deploy-url=/${SPA_PREFIX}/

      - name: Inject tenant assets
        run: |
          ASSETS_DIR="dist/out/browser/assets"
          git clone --depth 1 https://github.com/in2workspace/eudistack-platform-assets.git /tmp/platform-assets
          mkdir -p "${ASSETS_DIR}/tenant"
          cp -r /tmp/platform-assets/tenants/${TENANT}/* "${ASSETS_DIR}/tenant/"
          cp /tmp/platform-assets/tenants/${TENANT}/theme.json "${ASSETS_DIR}/theme.json"
          echo "Injected ${TENANT} tenant assets"

      - name: Generate env.js
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base

          if [ -f dist/out/browser/assets/env.template.js ]; then
            envsubst < dist/out/browser/assets/env.template.js > dist/out/browser/assets/env.js
            echo "Generated env.js"
          else
            echo "env.template.js not found" >&2
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build to S3
        run: |
          set -euo pipefail

          aws s3 sync dist/out/browser/ "s3://${S3_BUCKET}/${SPA_PREFIX}/" \
            --delete \
            --exclude "index.html" \
            --exclude "assets/env.js" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 cp dist/out/browser/index.html "s3://${S3_BUCKET}/${SPA_PREFIX}/index.html" \
            --cache-control "no-store" \
            --content-type "text/html"

          aws s3 cp dist/out/browser/assets/env.js "s3://${S3_BUCKET}/${SPA_PREFIX}/assets/env.js" \
            --cache-control "no-store" \
            --content-type "application/javascript"

      - name: Invalidate CloudFront
        run: |
          set -euo pipefail
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${CF_COMMENT}'] | [0].Id" \
            --output text)

          if [ -z "${DIST_ID}" ] || [ "${DIST_ID}" = "None" ]; then
            echo "::error::CloudFront distribution for tenant '${TENANT}' not found"
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/${SPA_PREFIX}/*"

          echo "### 🚀 Deployed to S3 + CloudFront" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant:** ${TENANT}" >> $GITHUB_STEP_SUMMARY
          echo "- **SPA prefix:** /${SPA_PREFIX}/" >> $GITHUB_STEP_SUMMARY
          echo "- **Distribution:** ${DIST_ID}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${SITE_HOST}/${SPA_PREFIX}/" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test
        run: |
          SITE_URL="https://${SITE_HOST}/${SPA_PREFIX}/"
          sleep 30
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "${SITE_URL}" --max-time 15 || echo "000")
          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "Smoke test passed (HTTP ${HTTP_STATUS})"
          else
            echo "::warning::Smoke test returned HTTP ${HTTP_STATUS} for ${SITE_URL}"
          fi
